[platformio]
default_envs =
    release

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board = esp32dev

board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = min_spiffs.csv

monitor_speed = 500000

lib_ldf_mode = deep
lib_compat_mode = strict
lib_deps =
    lsh-bridge=symlink://../..

[base_configs]
build_flags =
    -D ARDUINOJSON_DEBUG=0
    -D CORE_DEBUG_LEVEL=0
    ; lsh-bridge capacities
    -D CONFIG_MAX_ACTUATORS=12U
    -D CONFIG_MAX_BUTTONS=12U
    -D CONFIG_MAX_NAME_LENGTH=4U

    ; serial link to the controller
    -D CONFIG_ARDCOM_SERIAL_RX_PIN=16U
    -D CONFIG_ARDCOM_SERIAL_TX_PIN=17U
    -D CONFIG_ARDCOM_SERIAL_BAUD=250000U
    -D CONFIG_ARDCOM_SERIAL_TIMEOUT_MS=5U

    ; MQTT topic layout
    -D CONFIG_MQTT_TOPIC_BASE=\"LSH\"
    -D CONFIG_MQTT_TOPIC_INPUT=\"IN\"
    -D CONFIG_MQTT_TOPIC_STATE=\"state\"
    -D CONFIG_MQTT_TOPIC_CONF=\"conf\"
    -D CONFIG_MQTT_TOPIC_MISC=\"misc\"
    -D CONFIG_MQTT_TOPIC_SERVICE=\"LSH/Node-RED/SRV\"

    ; liveness timers
    -D CONFIG_PING_INTERVAL_CONTROLLINO_MS=10000U
    -D CONFIG_CONNECTION_TIMEOUT_CONTROLLINO_MS=10200U

    ; payload codecs and optional debug behavior
    -D CONFIG_MSG_PACK_ARDUINO
    ; -D CONFIG_MSG_PACK_MQTT
    ; -D LSH_DEBUG
    ; -D HOMIE_RESET

[env:release]
build_flags =
    ${base_configs.build_flags}

[aggressive_configs]
build_unflags =
    -fno-lto
    -std=gnu++2a -std=gnu++2b
    -std=gnu++11 -std=gnu++17 -std=gnu++20 -std=gnu++23
    -std=c++11 -std=c++17 -std=c++20 -std=c++23
build_flags =
    ${base_configs.build_flags}
    -std=gnu++26
    -fno-exceptions
    -fno-rtti
    -fno-threadsafe-statics
    -fno-use-cxa-atexit
    -fno-stack-protector
    -fmerge-all-constants
    -ffast-math
    -fno-isolate-erroneous-paths-dereference
    -mno-serialize-volatile
    -mtarget-align
    -ffunction-sections
    -fdata-sections
    -flto=auto
    -Wl,--relax,--strip-all,--gc-sections,--sort-common,--sort-section=alignment,-u,app_main

[env:release_aggressive]
build_unflags =
    ${aggressive_configs.build_unflags}
build_flags =
    ${aggressive_configs.build_flags}
