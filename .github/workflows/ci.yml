name: CI & Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python3 -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install Node tooling
        run: npm ci

      - name: Install Python tooling
        run: uv sync --locked --all-groups

      - name: Run shared quality gate
        run: npm run check

  validate-generated-protocol:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate generated protocol artifacts
        run: python3 tools/update_lsh_protocol.py --check

  build-public-example:
    needs: validate-generated-protocol
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        env:
          - release
          - release_aggressive
          - release_json_serial
          - release_msgpack_mqtt
          - release_json_serial_msgpack_mqtt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key:
            ${{ runner.os }}-platformio-${{ hashFiles('library.json',
            'examples/basic-homie-bridge/platformio.ini') }}
          restore-keys: ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: python3 -m pip install --upgrade pip "platformio==6.1.19"

      - name: Build public example
        run: |
          set -eu
          python3 - <<'PY'
          import pathlib
          import re

          path = pathlib.Path("examples/basic-homie-bridge/platformio.ini")
          contents = path.read_text(encoding="utf-8")
          registry_dependency = re.compile(r"(?m)^(\s*)labodj/lsh-bridge@.*$")
          if not registry_dependency.search(contents):
              raise SystemExit("Expected labodj/lsh-bridge registry dependency was not found")
          contents = registry_dependency.sub(lambda match: f"{match.group(1)}lsh-bridge=symlink://../..", contents)
          path.write_text(contents, encoding="utf-8")
          PY
          platformio run -d examples/basic-homie-bridge -e "${{ matrix.env }}"

  package-registry-smoke:
    needs: validate-generated-protocol
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key:
            ${{ runner.os }}-platformio-package-smoke-${{ hashFiles('library.json',
            'examples/basic-homie-bridge/platformio.ini') }}
          restore-keys: ${{ runner.os }}-platformio-package-smoke-

      - name: Install PlatformIO
        run: python3 -m pip install --upgrade pip "platformio==6.1.19"

      - name: Pack library and build a registry-style consumer
        run: |
          set -eu
          package_path=$(mktemp --suffix=.tar.gz)
          smoke_dir=$(mktemp -d)
          trap 'rm -f "$package_path"; rm -rf "$smoke_dir"' EXIT

          platformio pkg pack --output "$package_path"
          python3 - "$package_path" <<'PY'
          import re
          import sys
          import tarfile
          from urllib.parse import urlsplit

          package_path = sys.argv[1]
          inline_link = re.compile(r"!?\[[^\]]+\]\(([^)\s]+)(?:\s+\"[^\"]*\")?\)")
          reference_link = re.compile(r"^\s*\[[^\]]+\]:\s*(\S+)", re.MULTILINE)

          def is_external(url: str) -> bool:
              parsed = urlsplit(url)
              return bool(parsed.scheme) or url.startswith("#")

          def markdown_links(markdown: str):
              yield from (match.group(1) for match in inline_link.finditer(markdown))
              yield from (match.group(1) for match in reference_link.finditer(markdown))

          with tarfile.open(package_path, "r:gz") as package:
              markdown_members = sorted(
                  member.name.rstrip("/")
                  for member in package.getmembers()
                  if member.isfile() and member.name.endswith(".md")
              )

              errors = []
              for name in markdown_members:
                  content = package.extractfile(name).read().decode("utf-8")
                  for raw_url in markdown_links(content):
                      url = raw_url.strip("<>")
                      if is_external(url):
                          continue
                      parsed = urlsplit(url)
                      if not parsed.path:
                          continue
                      errors.append(f"{name}: registry markdown uses relative link {raw_url}")

              if errors:
                  raise SystemExit("\n".join(errors))
          PY
          tar -tzf "$package_path" | grep -F "docs/runtime-behavior.md"
          tar -tzf "$package_path" | grep -F "examples/basic-homie-bridge/platformio.ini"
          tar -tzf "$package_path" | grep -F "src/lsh_bridge.hpp"
          ! tar -tzf "$package_path" | grep -E '(^|/)(\.pio|\.github|vendor|tools)(/|$)'

          mkdir -p "$smoke_dir/include" "$smoke_dir/src"
          cp examples/basic-homie-bridge/include/lsh_etl_profile_override.h "$smoke_dir/include/"
          cp examples/basic-homie-bridge/src/main.cpp "$smoke_dir/src/"
          # Keep the checked-in example on the public registry workflow; rewrite
          # only this temporary copy to prove the packed registry artifact works.
          python3 - "$package_path" "$smoke_dir" <<'PY'
          import pathlib
          import re
          import sys

          package_path = sys.argv[1]
          smoke_dir = pathlib.Path(sys.argv[2])
          source = pathlib.Path("examples/basic-homie-bridge/platformio.ini")
          target = smoke_dir / "platformio.ini"
          contents = source.read_text(encoding="utf-8")
          registry_dependency = re.compile(r"(?m)^(\s*)labodj/lsh-bridge@.*$")
          if not registry_dependency.search(contents):
              raise SystemExit("Expected labodj/lsh-bridge registry dependency was not found")
          contents = registry_dependency.sub(lambda match: f"{match.group(1)}file://{package_path}", contents)
          target.write_text(contents, encoding="utf-8")
          PY

          platformio run -d "$smoke_dir" -e release

  release:
    needs: [validate-generated-protocol, build-public-example, package-registry-smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify library version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          LIBRARY_VERSION=$(python3 -c "import json; print(json.load(open('library.json', 'r', encoding='utf-8'))['version'])")
          if [ "$LIBRARY_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: library.json version ($LIBRARY_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: lsh-bridge ${{ github.ref_name }}
          generate_release_notes: true

  publish-platformio-registry:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python3 -m pip install --upgrade pip "platformio==6.1.19"

      - name: Publish library to PlatformIO Registry
        env:
          PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
        run: |
          set -eu
          if [ -z "${PLATFORMIO_AUTH_TOKEN:-}" ]; then
            echo "PLATFORMIO_AUTH_TOKEN GitHub secret is not configured."
            exit 1
          fi

          package_path=$(mktemp --suffix=.tar.gz)
          trap 'rm -f "$package_path"' EXIT

          platformio pkg pack --output "$package_path"
          platformio pkg publish "$package_path" --owner labodj --type library --no-interactive
